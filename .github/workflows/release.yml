name: release

# Pushing a `v*` tag (e.g. v0.1.0) builds zerod for every supported triple,
# packages each one as a tarball + sha256, and attaches them to a GitHub
# release. Also dispatchable manually for dry runs.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist on a commit.'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # macOS targets — native build, cross-compile to the other arch via the
  # platform's bundled compilers. `protoc` from Homebrew.
  build-darwin:
    name: build / ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install protoc
        run: brew install protobuf

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }} --bin zerod

      - name: Package tarball
        id: pkg
        run: |
          set -euo pipefail
          name="zerod-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/zerod" "dist/$name/"
          cp README.md LICENSE zerod.toml.example "dist/$name/"
          tar -C dist -czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"
          echo "archive=$name.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zerod-${{ matrix.target }}
          path: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.archive }}.sha256
          if-no-files-found: error

  # Linux targets — cross + docker buildx. Cross builds each target inside
  # the matching `Dockerfile.<triple>`, which already pins protoc 25.1 and
  # the multiarch dev libs we need.
  build-linux:
    name: build / ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
          - target: arm-unknown-linux-gnueabihf
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Cross's target dir lives inside the docker container, but the
          # registry / git cache + ~/.cargo cache on the host still help.
          key: ${{ matrix.target }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: cross build --release
        run: cross build --release --target ${{ matrix.target }} --bin zerod

      - name: Package tarball
        id: pkg
        run: |
          set -euo pipefail
          name="zerod-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/zerod" "dist/$name/"
          cp README.md LICENSE zerod.toml.example "dist/$name/"
          tar -C dist -czf "$name.tar.gz" "$name"
          sha256sum "$name.tar.gz" > "$name.tar.gz.sha256"
          echo "archive=$name.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zerod-${{ matrix.target }}
          path: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.archive }}.sha256
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: [build-darwin, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true

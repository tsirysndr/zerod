syntax = "proto3";
package zerod.v1alpha1;

message BluetoothDevice {
  string address = 1;
  string name = 2;
  bool paired = 3;
  bool trusted = 4;
  bool connected = 5;
  optional int32 rssi = 6;
}

message ScanRequest {
  // Discovery window in seconds. 0 → server default (10).
  uint32 timeout_secs = 1;
}
message ScanResponse {
  repeated BluetoothDevice devices = 1;
}

message ListDevicesRequest {}
message ListDevicesResponse {
  repeated BluetoothDevice devices = 1;
}

message PairRequest { string address = 1; }
message PairResponse {}

message ConnectDeviceRequest { string address = 1; }
message ConnectDeviceResponse {}

message DisconnectRequest { string address = 1; }
message DisconnectResponse {}

message RemoveRequest { string address = 1; }
message RemoveResponse {}

service BluetoothService {
  rpc Scan(ScanRequest) returns (ScanResponse);
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);
  rpc Pair(PairRequest) returns (PairResponse);
  rpc ConnectDevice(ConnectDeviceRequest) returns (ConnectDeviceResponse);
  rpc Disconnect(DisconnectRequest) returns (DisconnectResponse);
  rpc Remove(RemoveRequest) returns (RemoveResponse);
}

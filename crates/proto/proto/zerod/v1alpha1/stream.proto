syntax = "proto3";
package zerod.v1alpha1;

enum AudioOutput {
  AUDIO_OUTPUT_UNSPECIFIED = 0;
  AUDIO_OUTPUT_CPAL = 1;     // default cpal device
  AUDIO_OUTPUT_STDOUT = 2;   // raw S16LE PCM to stdout
  AUDIO_OUTPUT_PIPE = 3;     // raw S16LE PCM to named pipe (pipe_path)
}

enum PlayerState {
  PLAYER_STATE_UNSPECIFIED = 0;
  PLAYER_STATE_STOPPED = 1;
  PLAYER_STATE_BUFFERING = 2;
  PLAYER_STATE_PLAYING = 3;
  PLAYER_STATE_PAUSED = 4;
  PLAYER_STATE_ERRORED = 5;
}

enum PlaybackSource {
  PLAYBACK_SOURCE_UNSPECIFIED = 0;
  PLAYBACK_SOURCE_HLS = 1;
  PLAYBACK_SOURCE_DASH = 2;
  PLAYBACK_SOURCE_SPOTIFY = 3;
}

message PlayRequest {
  // HLS (.m3u8) or DASH (.mpd) URL.
  string url = 1;
  AudioOutput output = 2;
  // Required when output == AUDIO_OUTPUT_PIPE.
  optional string pipe_path = 3;
  // Optional cpal device name; empty → default device.
  optional string cpal_device = 4;
}
message PlayResponse {}

message PauseRequest {}
message PauseResponse {}

message ResumeRequest {}
message ResumeResponse {}

message StopRequest {}
message StopResponse {}

message StatusRequest {}
message StatusResponse {
  PlayerState state = 1;
  string url = 2;
  int64 position_ms = 3;
  int64 duration_ms = 4;  // -1 for live
  bool is_live = 5;
  optional string error = 6;
  AudioOutput output = 7;
  uint32 volume_percent = 8;  // per-stream gain, 0..=100
  PlaybackSource source = 9;
}

message SpotifyStartRequest {
  AudioOutput output = 1;
  // Required when output == AUDIO_OUTPUT_PIPE.
  optional string pipe_path = 2;
  optional string cpal_device = 3;
}
message SpotifyStartResponse {}

message SpotifyStopRequest {}
message SpotifyStopResponse {}

message SetStreamVolumeRequest {
  uint32 volume_percent = 1;  // 0..=100
}
message SetStreamVolumeResponse {}

message GetStreamVolumeRequest {}
message GetStreamVolumeResponse {
  uint32 volume_percent = 1;
}

service StreamService {
  rpc Play(PlayRequest) returns (PlayResponse);
  rpc Pause(PauseRequest) returns (PauseResponse);
  rpc Resume(ResumeRequest) returns (ResumeResponse);
  rpc Stop(StopRequest) returns (StopResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
  // Per-stream software gain applied in the player loop before the sink.
  // Independent of the system ALSA mixer (see VolumeService).
  rpc SetStreamVolume(SetStreamVolumeRequest) returns (SetStreamVolumeResponse);
  rpc GetStreamVolume(GetStreamVolumeRequest) returns (GetStreamVolumeResponse);
  // Start a Spotify Connect session via librespot. The daemon advertises
  // itself on the LAN; the phone picks it from the Devices list. Returns
  // FAILED_PRECONDITION when `[librespot].enabled = false` or the binary
  // is missing.
  rpc SpotifyStart(SpotifyStartRequest) returns (SpotifyStartResponse);
  rpc SpotifyStop(SpotifyStopRequest) returns (SpotifyStopResponse);
}

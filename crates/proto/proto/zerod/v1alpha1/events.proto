syntax = "proto3";
package zerod.v1alpha1;

import "zerod/v1alpha1/stream.proto";

// Single envelope for every event the daemon emits. New event kinds go
// into the `payload` oneof; the field tag is the wire-stable identity.
message Event {
  int64 timestamp_ms = 1;
  oneof payload {
    StreamStateChanged stream_state = 10;
    StreamVolumeChanged stream_volume = 11;
    BluetoothDeviceChanged bt_device = 20;
    BluetoothPairingRequest bt_pairing_request = 21;
    BluetoothA2dpConnected bt_a2dp_connected = 22;
    BluetoothA2dpDisconnected bt_a2dp_disconnected = 23;
    SystemdUnitState systemd_unit = 30;
    VolumeChanged volume = 40;
    SnapcastClientChanged snap_client = 50;       // reserved for PR2
    LibrespotStateChanged librespot_state = 60;   // reserved for PR3
    LaggedEvent lagged = 99;
  }
}

message StreamStateChanged {
  PlayerState state = 1;
  string url = 2;
  optional string error = 3;
}

message StreamVolumeChanged {
  uint32 volume_percent = 1;
}

message BluetoothDeviceChanged {
  string address = 1;
  string name = 2;
  bool paired = 3;
  bool connected = 4;
  bool trusted = 5;
}

message BluetoothPairingRequest {
  string address = 1;
  optional uint32 passkey = 2;
}

message BluetoothA2dpConnected {
  string address = 1;
  string name = 2;
}

message BluetoothA2dpDisconnected {
  string address = 1;
  string name = 2;
}

message SystemdUnitState {
  string name = 1;
  string active_state = 2;
  string sub_state = 3;
  bool enabled = 4;
}

message VolumeChanged {
  string card = 1;
  string control = 2;
  uint32 volume_percent = 3;
  bool muted = 4;
}

message SnapcastClientChanged {
  string client_id = 1;
  string name = 2;
  uint32 volume_percent = 3;
  bool muted = 4;
}

message LibrespotStateChanged {
  string state = 1;
  optional string track = 2;
}

// Synthetic event emitted by the server when a subscriber falls behind and
// `broadcast::Receiver::recv` returns `Lagged(n)`. Clients can treat this
// as a hint to re-fetch state.
message LaggedEvent {
  uint64 dropped = 1;
}

message SubscribeRequest {
  // Filter labels. Empty → receive every event. Supports exact match
  // (`stream.state`) or a `.*` wildcard suffix (`bt.*` matches every
  // bluetooth event). See `Event.kind()` in the server for the label list.
  repeated string kinds = 1;
}

service EventsService {
  rpc Subscribe(SubscribeRequest) returns (stream Event);
}
